name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # Sinal de drift do design system — falha se o snapshot commitado
      # divergir do medido (audit rodado sem commitar o resultado).
      - name: Design audit
        run: |
          pnpm design:audit
          git diff -I '"generatedAt"' --exit-code src/app/design/audit.json

      # Sem .env.local no CI => build em modo demo (mock), sem backend.
      - name: Build
        run: pnpm build

      - name: Unit tests + coverage (Vitest)
        run: pnpm test:cov

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E (Playwright)
        run: pnpm test:e2e
